id: springboot-default
description: Base profile for any your-service-* Java/Spring Boot service (Gradle)
build_tool: gradle
build_command: "./gradlew clean build"
jacoco_line_ratio: 0.80
rules:
  - java-springboot-standards.mdc
  - service-quality-drill.mdc
  - pr-code-review.mdc
  - external/jabrena-302-java-testing-fundamentals.mdc
  - external/jabrena-311-spring-boot-slice-testing.mdc
  - external/jabrena-312-spring-boot-integration-testing.mdc
phases_enabled: [0, 0b, 1, 2, 3, 4, 5, 6, 7, 8, 9]
ship: human-approved
default_mode: L1
human_gates: []
mcp:
  - atlassian
  - github
  - glean
